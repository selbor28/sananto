<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
</head>
<title>SanAnto.net</title>

<body class='sabody'>SanAnto.net
<div id='list_entry_form'>
<form class='fclass' id='contactForm'>
    <div class='form-group'>
        <label>Listing</label>
        <input type='text' class='form-control' id='listing'>
    </div>
    <div class='form-group'>
        <label>Address</label>
        <input type='text' class='form-control' id='address'>
    </div>
    <div class='form-group'>
        <label>type</label>
        <input list='listTypes' class='form-control' id='type'>
        <datalist id='listTypes'>
            <option value='Restaurants'></option>
            <option value='Supplies'></option>
            <option value='NightLife'></option>
        </datalist>
    </div>
    <div class='form-group'>
        <h2>Restaurant Category</h2>
        <input type="checkbox" id="rc1" name="rc1" value="American">
        <label for="rc1"> American </label><br>
        <input type="checkbox" id="rc2" name="rc2" value="Chinese">
        <label for="rc2"> Chinese </label><br>
        <input type="checkbox" id="rc33" name="rc3" value="Mexican">
        <label for="rc3"> Mexican </label>
    </div>
</div>
</form>


<button>submit</button>
</div>
</body>
</html>
